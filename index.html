<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>台股掛單分析</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system;background:#fff;color:#000}
.container{max-width:500px;margin:40px auto;padding:20px}
input,button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}
button{background:#000;color:#fff}
.dropdown{border:1px solid #ddd;border-radius:10px;max-height:150px;overflow:auto}
.item{padding:10px;cursor:pointer}
.item:hover{background:#eee}
.card{border:1px solid #eee;border-radius:12px;padding:12px;margin-top:10px}
.warn{color:#d00}
.tag{border:1px solid #000;padding:4px 8px;border-radius:6px;display:inline-block;margin-bottom:6px}
</style>
</head>

<body>
<div class="container">

<h2>台股掛單分析</h2>

<input id="stock" placeholder="輸入股票名稱或代號" oninput="searchStock()" onkeydown="enter(event)">
<div id="dropdown" class="dropdown"></div>

<input id="budget" placeholder="輸入預算" onkeydown="enter(event)">
<button onclick="run()">計算</button>

<div id="result"></div>

</div>

<script>

let stockList=[];
let selected=null;

// ===== 股票清單 =====
async function loadStocks(){
  const res = await fetch("https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo");
  const json = await res.json();
  stockList = json.data;
}
loadStocks();

// ===== 搜尋 =====
function searchStock(){
  const input = document.getElementById("stock").value;
  const d = document.getElementById("dropdown");
  d.innerHTML="";

  if(!input) return;

  const list = stockList
    .filter(s=> s.stock_name.includes(input) || s.stock_id.includes(input))
    .slice(0,10);

  list.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText=`${s.stock_name} (${s.stock_id})`;
    div.onclick=()=>selectStock(s);
    if(i===0) div.id="first";
    d.appendChild(div);
  });
}

function selectStock(s){
  document.getElementById("stock").value=`${s.stock_name} (${s.stock_id})`;
  selected=s.stock_id;
  document.getElementById("dropdown").innerHTML="";
}

// Enter
function enter(e){
  if(e.key==="Enter"){
    const f=document.getElementById("first");
    if(f) f.click();
    else run();
  }
}

// ===== 抓價格 =====
async function getData(id){
  const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${id}&start_date=2024-01-01`);
  const json = await res.json();
  return json.data;
}

// ===== 工具 =====
const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;

function std(a){
  const m = avg(a);
  return Math.sqrt(
    a.reduce((sum, x) => sum + Math.pow(x - m, 2), 0) / (a.length - 1)
  );
}

function tick(price){
  if(price<10) return 0.01;
  if(price<50) return 0.05;
  if(price<100) return 0.1;
  if(price<500) return 0.5;
  return 1;
}

function round(price){
  const t=tick(price);
  return Math.round(price/t)*t;
}

// ===== AI =====
async function getAI(name){
  try{
    const res = await fetch("/api/ai",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[
          {role:"system",content:"輸出JSON: {summary, stockType}"},
          {role:"user",content:`分析股票 ${name}`}
        ]
      })
    });
    const json = await res.json();
    return JSON.parse(json.choices[0].message.content);
  }catch{
    return {
      summary:"產業相關公司，近期受市場題材影響",
      stockType:null
    };
  }
}

// ===== 主流程 =====
async function run(){
  const result=document.getElementById("result");
  result.innerHTML="Loading...";

  const id = selected || document.getElementById("stock").value;
  const budget = Number(document.getElementById("budget").value);

  const data = await getData(id);
  if(!data || data.length<30){
    result.innerHTML="資料不足";
    return;
  }

  const prices = data.map(d=>d.close);
  const P = prices.at(-1);

  const ma5 = avg(prices.slice(-5));
  const ma20 = avg(prices.slice(-20));
  const low30 = Math.min(...prices.slice(-30));

  // ===== 股性 =====
  let type="成長股";
  const returns = prices.slice(1).map((p,i)=>Math.log(p/prices[i]));
  const sigma = std(returns);

  if(sigma<0.015) type="穩定股";
  else if(sigma<0.03) type="成長股";
  else type="題材股";

  // ===== AI =====
  const ai = await getAI(id);
  if(ai.stockType) type = ai.stockType;

  // ===== 價格 =====
  let P2 = (ma20 + P)/2;
  let P1 = Math.max(ma5, P*0.98);
  let P3 = Math.max(low30, P2*0.9);

  P1 = round(P1);
  P2 = round(P2);
  P3 = round(P3);

  // ===== 判斷筆數 =====
  let mode="三筆";

  if(Math.abs(P1-P2)/P <0.02){
    mode="雙筆";
  }

  if(Math.abs(P2-P3)/P <0.02){
    mode="單筆";
  }

  // ===== UI =====
  let html="";

  html+=`<div class="tag">${type}</div>`;
  html+=`<div>${ai.summary}</div>`;

  if(mode==="單筆"){
    html+=`<div class="warn">不適合分批，已轉單筆</div>`;
    html+=`<div class="card">第2筆：$${P2}</div>`;
  }
  else if(mode==="雙筆"){
    html+=`<div class="warn">不適合三筆，轉雙筆</div>`;
    html+=`<div class="card">第2筆：$${P2}</div>`;
    html+=`<div class="card">第3筆：$${P3}</div>`;
  }
  else{
    html+=`<div class="card">第1筆：$${P1}</div>`;
    html+=`<div class="card">第2筆：$${P2}</div>`;
    html+=`<div class="card">第3筆：$${P3}</div>`;
  }

  result.innerHTML=html;
}

</script>
</body>
</html>
