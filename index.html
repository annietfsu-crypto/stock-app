<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股掛單分析工具（進階版）</title>
  <style>
    body { font-family: -apple-system, Arial; padding: 16px; background: #f5f5f5; }
    .card { background: white; padding: 16px; border-radius: 16px; max-width: 520px; margin: auto; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size:16px; border-radius:10px; border:1px solid #ddd; }
    button { background:#111; color:white; }
    .result { margin-top: 16px; }
    .order { background:#fafafa; padding:10px; border-radius:10px; margin-top:8px; }
    .badge { display:inline-block; padding:6px 10px; border-radius:10px; background:#eee; margin-bottom:8px; }
    .warn { background:#ffe5e5; }
    .good { background:#e5ffe5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>台股掛單分析（進階）</h2>
    <input id="symbol" placeholder="輸入股票代號（例如 5347）" />
    <input id="budget" type="number" placeholder="輸入總預算" />
    <button onclick="run()">計算</button>
    <div class="result" id="output"></div>
  </div>

<script>
async function fetchData(symbol) {
  const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=2025-01-01`);
  const json = await res.json();
  return json.data;
}

function std(arr){
  const m = arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length-1));
}

function ma(arr,n){return arr.slice(-n).reduce((a,b)=>a+b,0)/n;}
function low(arr,n){return Math.min(...arr.slice(-n));}

function calcVol(p){
  let r=[];
  for(let i=1;i<p.length;i++) r.push(Math.log(p[i]/p[i-1]));
  return std(r);
}

function classify(s){
  if(!s) return "growth";
  if(s<0.015) return "stable";
  if(s<0.03) return "growth";
  return "theme";
}

function pct(t){
  if(t==="stable") return {down:0.03};
  if(t==="growth") return {down:0.10};
  return {down:0.15};
}

function tick(p){
  if(p<10) return 0.01;
  if(p<50) return 0.05;
  if(p<100) return 0.1;
  if(p<500) return 0.5;
  return 1;
}

function round(p){let t=tick(p);return Math.round(p/t)*t;}
function shares(b,p){return Math.floor(b/p);}

// 🔥 趨勢濾網
function trendFilter(P, MA20, MA60){
  if(P < MA20 && MA20 < MA60){
    return {mode:"avoid", msg:"空頭趨勢（下降排列）→ 不建議進場"};
  }
  if(P < MA20){
    return {mode:"weak", msg:"跌破20日線 → 降低倉位"};
  }
  return {mode:"ok", msg:"多頭或盤整"};
}

async function run(){
  const symbol = document.getElementById("symbol").value;
  const budget = Number(document.getElementById("budget").value);
  const output = document.getElementById("output");

  output.innerHTML="分析中...";

  const data = await fetchData(symbol);
  if(!data || data.length<60){ output.innerHTML="資料不足"; return; }

  const prices = data.map(d=>d.close);
  const P = prices.at(-1);
  const MA5 = ma(prices,5);
  const MA20 = ma(prices,20);
  const MA60 = ma(prices,60);
  const Low30 = low(prices,30);
  const sigma = calcVol(prices.slice(-60));

  const t = classify(sigma);
  const p = pct(t);

  const trend = trendFilter(P, MA20, MA60);

  // 🔥 趨勢直接阻擋
  if(trend.mode === "avoid"){
    output.innerHTML = `<div class="badge warn">${trend.msg}</div>`;
    return;
  }

  let adjBudget = budget;
  if(trend.mode === "weak"){
    adjBudget = budget * 0.5; // 降低風險
  }

  const P2 = (MA20 + P)/2;
  const P1 = Math.max(MA5, P*0.98);
  const P3 = Math.min(P2, Math.max(Low30, P2*(1-p.down)));

  const p1 = round(P1);
  const p2 = round(P2);
  const p3 = round(P3);

  const spread = (p1-p3)/p2;
  let B1 = adjBudget*0.25, B2=adjBudget*0.5, B3=adjBudget*0.25;

  if(spread < 0.05){ B2+=B1; B1=0; }

  const s1 = shares(B1,p1);
  const s2 = shares(B2,p2);
  const s3 = shares(B3,p3);

  output.innerHTML = `
    <div class="badge ${trend.mode==='ok'?'good':'warn'}">${trend.msg}</div>
    ${s1>0?`<div class="order">第1筆：${p1} / ${s1}</div>`:''}
    <div class="order">第2筆：${p2} / ${s2}</div>
    <div class="order">第3筆：${p3} / ${s3}</div>
  `;
}
</script>
</body>
</html>
