<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台股掛單分析（完整版）</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,Arial;padding:16px;background:#f5f5f5;margin:0}
.card{background:#fff;padding:16px;border-radius:16px;max-width:520px;margin:auto;overflow:hidden}
input,button{width:100%;padding:12px;margin:8px 0;font-size:16px;border-radius:10px;border:1px solid #ddd;display:block}
button{background:#111;color:#fff}
.dropdown{border:1px solid #ddd;border-radius:10px;max-height:160px;overflow:auto;width:100%}
.item{padding:10px;cursor:pointer}
.item:hover{background:#f0f0f0}
.badge{display:inline-block;padding:6px 10px;border-radius:10px;background:#eee;margin-bottom:8px}
.order{padding:12px;border-radius:12px;margin-top:10px;font-weight:500}
.order1{background:#e8f7ee}
.order2{background:#f3f3f3}
.order3{background:#e8f0ff}
.warn{background:#ffe5e5}
.good{background:#e5ffe5}
.meta{margin-bottom:10px;font-size:14px;color:#555}
</style>
</head>
<body>
<div class="card">
<h2>台股掛單分析（完整版）</h2>
<input id="symbol" placeholder="輸入股票名稱或代號" oninput="searchStock()" onkeydown="handleEnter(event)" />
<div id="dropdown" class="dropdown"></div>
<input id="budget" type="number" placeholder="輸入總預算" onkeydown="handleEnter(event)" />
<button onclick="run()">計算</button>
<div id="output"></div>
</div>

<script>
let stockList=[];let selectedSymbol=null;

async function loadStockList(){
 const res=await fetch('https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo');
 const json=await res.json();
 stockList=json.data;
}

function searchStock(){
 const input=document.getElementById('symbol').value;
 const d=document.getElementById('dropdown');
 d.innerHTML='';
 if(!input) return;
 const f=stockList.filter(s=>s.stock_name.includes(input)||s.stock_id.includes(input)).slice(0,10);
 f.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='item';
  div.innerText=`${s.stock_name} (${s.stock_id})`;
  div.onclick=()=>selectStock(s);
  if(i===0) div.id='firstItem';
  d.appendChild(div);
 });
}

function selectStock(s){
 document.getElementById('symbol').value=`${s.stock_name} (${s.stock_id})`;
 selectedSymbol=s.stock_id;
 document.getElementById('dropdown').innerHTML='';
 run();
}

function handleEnter(e){
 if(e.key==='Enter'){
  const f=document.getElementById('firstItem');
  if(f) f.click(); else run();
 }
}

async function fetchData(symbol){
 const res=await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=2025-01-01`);
 const json=await res.json();
 return json.data;
}

function std(a){const m=a.reduce((x,y)=>x+y,0)/a.length;return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/(a.length-1));}
function ma(a,n){return a.slice(-n).reduce((x,y)=>x+y,0)/n}
function low(a,n){return Math.min(...a.slice(-n))}
function vol(p){let r=[];for(let i=1;i<p.length;i++)r.push(Math.log(p[i]/p[i-1]));return std(r)}

function classify(s){if(!s)return '成長股';if(s<0.015)return '穩定股';if(s<0.03)return '成長股';return '題材股'}
function pct(t){if(t==='穩定股')return{down:0.03};if(t==='成長股')return{down:0.1};return{down:0.15}}

function tick(p){if(p<10)return 0.01;if(p<50)return 0.05;if(p<100)return 0.1;if(p<500)return 0.5;return 1}
function round(p){let t=tick(p);return Math.round(p/t)*t}
function shares(b,p){return Math.floor(b/p)}
function fmtPrice(p){return `$${p.toFixed(1)}`;}
function diffPct(p,cur){return (((p-cur)/cur)*100).toFixed(1)}

function trend(P,MA20,MA60){
 if(P<MA20&&MA20<MA60)return{mode:'avoid',msg:'空頭趨勢（不進場）'};
 if(P<MA20)return{mode:'weak',msg:'保守模式（跌破20MA）'};
 return{mode:'ok',msg:'正常模式（多頭/盤整）'};
}

async function run(){
 const budget=Number(document.getElementById('budget').value);
 const out=document.getElementById('output');
 if(!selectedSymbol){out.innerHTML='請選擇股票';return}
 out.innerHTML='分析中...';

 try{
 const data=await fetchData(selectedSymbol);
 if(!data||data.length<60){out.innerHTML='資料不足';return}

 const prices=data.map(d=>d.close);
 const P=prices.at(-1);
 const MA5=ma(prices,5);
 const MA20=ma(prices,20);
 const MA60=ma(prices,60);
 const Low30=low(prices,30);
 const sigma=vol(prices.slice(-60));

 const stockType=classify(sigma);
 const p=pct(stockType);
 const tr=trend(P,MA20,MA60);

 if(tr.mode==='avoid'){out.innerHTML = `<div class='badge warn'>${tr.msg}</div>`;return}

 let adj=budget;
 if(tr.mode==='weak') adj=budget*0.5;

 // 新版 P1 / P2（統一：市場 + 波動）
// 依 σ 動態決定係數（隱含股性）
let k1, k2;
if(sigma < 0.015){ k1 = 0.5; k2 = 1.0; }
else if(sigma < 0.03){ k1 = 0.8; k2 = 1.5; }
else { k1 = 1.2; k2 = 2.0; }

let P1 = Math.max(MA5, P * (1 - k1 * sigma));
let P2 = Math.max(MA20, P * (1 - k2 * sigma));

// 防呆：確保順序與合理區間
P1 = Math.min(P, P1);
P2 = Math.min(P, P2);
if(P1 < P2){ P1 = P2; }
 // 新版 P3 模型（結構 + 均線 + 波動）
const sigmaAdj = 1.2 * sigma;
const S1 = Low30;
const S2 = MA60;
const S3 = P2 * (1 - sigmaAdj);

let P3_raw = Math.max(S1, S2, S3);
let P3 = Math.min(P2, P3_raw);

// 防呆底線（避免過低）
P3 = Math.max(P3, P * 0.85);

// ✅ 分批有效性判斷（升級：三筆 / 雙筆 / 單筆）
const p1=round(P1),p2=round(P2),p3=round(P3);

const gap12 = (p1 - p2) / P;
const gap23 = (p2 - p3) / P;

let mode = 'three';

if(gap12 < 0.02 && gap23 < 0.02){
  mode = 'one';
}else if(gap12 < 0.02 || gap23 < 0.02){
  mode = 'two';
}

 const spread=(p1-p3)/p2;
let B1=adj*0.25,B2=adj*0.5,B3=adj*0.25;

if(mode==='two'){
  B2 += B1;
  B1 = 0;
}else if(mode==='one'){
  B2 = adj;
  B1 = 0;
  B3 = 0;
}

const s1=shares(B1,p1),s2=shares(B2,p2),s3=shares(B3,p3);

 out.innerHTML=`
 ${mode==='three' ? '' : `<div class='badge warn'>⚠️ 不適合分批，已自動轉為${mode==='two'?'雙筆':'單筆'}策略</div>`}
 <div class='badge ${tr.mode==='ok'?'good':'warn'}'>${tr.msg}</div>
 <div class='meta'>股性：${stockType} ｜ 現價：${fmtPrice(P)}</div>
 ${mode==='three' && s1>0?`<div class='order order1'>第1筆：${fmtPrice(p1)}（${diffPct(p1,P)}%） 元 / ${s1} 股</div>`:''}
 ${mode!=='one'?`<div class='order order2'>第2筆：${fmtPrice(p2)}（${diffPct(p2,P)}%） 元 / ${s2} 股</div>`:''}
 <div class='order order3'>${mode==='one'?'第2筆':'第3筆'}：${fmtPrice(mode==='one'?p2:p3)}（${diffPct(mode==='one'?p2:p3,P)}%） 元 / ${mode==='one'?s2:s3} 股</div>
 `;

 }catch(e){out.innerHTML='錯誤'}
}

loadStockList();
</script>
</body>
</html>
