<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>台股掛單分析</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system;background:#fff;color:#000}
.container{max-width:500px;margin:40px auto;padding:20px}

input,button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

button{
  background:#000;
  color:#fff;
}

.dropdown{
  border:1px solid #ddd;
  border-radius:10px;
  max-height:150px;
  overflow:auto;
}

.item{
  padding:10px;
  cursor:pointer;
}

.item:hover{
  background:#eee;
}

.card{
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.tag{
  border:1px solid #000;
  padding:4px 8px;
  border-radius:6px;
  display:inline-block;
  margin-right:6px;
  margin-bottom:6px;
}

.warn{color:#d00}
</style>
</head>

<body>
<div class="container">

<h2>台股掛單分析</h2>

<input id="stock" placeholder="輸入股票名稱或代號" oninput="searchStock()" onkeydown="enter(event)">
<div id="dropdown" class="dropdown"></div>

<input id="budget" placeholder="輸入預算" onkeydown="enter(event)">

<button onclick="run()">計算</button>

<div id="result"></div>

</div>

<script>

let stockList=[];
let selected=null;

// ===== 載入股票 =====
async function loadStocks(){
  const res = await fetch("https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo");
  const json = await res.json();
  stockList = json.data;
}
loadStocks();

// ===== 搜尋 =====
function searchStock(){
  const input = document.getElementById("stock").value;
  const d = document.getElementById("dropdown");
  d.innerHTML="";

  if(!input) return;

  const list = stockList
    .filter(s=> s.stock_name.includes(input) || s.stock_id.includes(input))
    .slice(0,10);

  list.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText=`${s.stock_name} (${s.stock_id})`;
    div.onclick=()=>selectStock(s);
    if(i===0) div.id="first";
    d.appendChild(div);
  });
}

function selectStock(s){
  document.getElementById("stock").value=`${s.stock_name} (${s.stock_id})`;
  selected=s;
  document.getElementById("dropdown").innerHTML="";
}

// ===== Enter =====
function enter(e){
  if(e.key==="Enter"){
    const f=document.getElementById("first");
    if(f) f.click();
    else run();
  }
}

// ===== 抓價格 + 歷史 =====
async function getPriceAndHistory(id){
  const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${id}&start_date=2024-01-01`);
  const json = await res.json();
  const data = json.data;

  const recent = data.slice(-60);
  const prices = recent.map(d=>d.close);

  return {
    price: prices[prices.length-1],
    prices
  };
}

// ===== AI =====
async function getAISummary(name,id){
  try{
    const res = await fetch("/api/ai",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({name,id})
    });

    const data = await res.json();

    return data.summary || "無法取得摘要";

  }catch(e){
    return "無法取得摘要";
  }
}

// ===== 主邏輯 =====
async function run(){

  if(!selected){
    alert("請選擇股票");
    return;
  }

  const budget = Number(document.getElementById("budget").value);
  if(!budget){
    alert("請輸入預算");
    return;
  }

  const id = selected.stock_id;
  const name = selected.stock_name;

  const { price, prices } = await getPriceAndHistory(id);
  const summary = await getAISummary(name,id);

  // ===== 波動 =====
  const high = Math.max(...prices);
  const low = Math.min(...prices);
  const volatility = (high - low) / price;

  // ===== 股性 =====
  let stockType = "";
  if (volatility < 0.02) {
    stockType = "穩定股";
  } else if (volatility < 0.05) {
    stockType = "成長股";
  } else {
    stockType = "題材股";
  }

  // ===== 策略 =====
  let strategy = "";
  let k1, k2, k3;
  let position;

  if (stockType === "穩定股") {
    strategy = "三筆";
    k1 = 0.02;
    k2 = 0.04;
    k3 = 0.06;
    position = [0.4, 0.3, 0.3];
  }
  else if (stockType === "成長股") {
    strategy = "三筆";
    k1 = 0.03;
    k2 = 0.06;
    k3 = 0.10;
    position = [0.3, 0.4, 0.3];
  }
  else {
    strategy = "兩筆";
    k1 = 0.05;
    k2 = 0.12;
    position = [0.5, 0.5];
  }

  // ===== 價格 =====
  const P1 = price * (1 - k1);
  const P2 = price * (1 - k2);
  const P3 = k3 ? price * (1 - k3) : null;

  // ===== 股數 =====
  const s1 = Math.floor((budget * position[0]) / P1);
  const s2 = Math.floor((budget * position[1]) / P2);
  const s3 = P3 ? Math.floor((budget * position[2]) / P3) : 0;

  // ===== 動態訂單 =====
  let ordersHTML = `
    <div class="card">第1筆：$${P1.toFixed(1)} / ${s1} 股</div>
    <div class="card">第2筆：$${P2.toFixed(1)} / ${s2} 股</div>
  `;

  if (strategy === "三筆") {
    ordersHTML += `
      <div class="card">第3筆：$${P3.toFixed(1)} / ${s3} 股</div>
    `;
  }

  // ===== UI =====
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="tag">${stockType}</div>
      <div class="tag">${strategy}策略</div>

      <div>個股關鍵字：${summary}</div>
      <div>現價：$${price.toFixed(1)}</div>

      ${ordersHTML}
    </div>
  `;
}

</script>
</body>
</html>
